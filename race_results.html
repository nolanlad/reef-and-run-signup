<body>
    <h1>Race Results</h1>
    <div id="results"></div>
    <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <div></div>
    <div class="saveButton"><button id="saveBtn">Save Race Results</button></div>
    <div id="confirmDialog" class="dialog hidden">
        <p>Publish Race Resultss</p>
        <label>Race Name</label>
        <input id="raceName" value="">
        <button id="confirmEnd" onclick="publishRaceResults()">Publish</button>
        <button id="cancelEnd" onclick='document.getElementById("confirmDialog").classList.toggle("hidden")'>Cancel</button>
    </div>
    <div id="editDialog" class="dialog hidden">
        <p>Edit</p>
        <label>Race Time</label>
        <input id="editTime" value="">
        <input id="bibNumHidden" type="hidden">
        <form style="display: flex; justify-content: space-between; width: 100%;">
            <div style="display: flex; align-items: center; gap: 0.5em; white-space: nowrap;">
              500m
              <input id="edit500m" type="radio" name="race" style="margin: 60;" value="500m">
            </div>
            <div style="display: flex; align-items: center; gap: 0.5em; white-space: nowrap;">
              1000m
              <input id="edit1000m" type="radio" name="race" style="margin: 10;" value="1000m">
            </div>
            <div style="display: flex; align-items: center; gap: 0.5em; white-space: nowrap;">
                1 Mile
                <input id="edit1mile" type="radio" name="race" style="margin: 10;" value="1mile">
            </div>
            <div style="display: flex; align-items: center; gap: 0.5em; white-space: nowrap;">
                Biath
                <input id="editbiath" type="radio" name="race" style="margin: 10;" value="biath">
            </div>
        </form>
        <button id="confirmEnd" onclick="publishEdit()">Edit</button>
        <button id="cancelEnd" onclick='close_edit_dialog()'>Cancel</button>
    </div>
    <!-- Side Menu -->
    <div class="side-menu">
        <ul>
            <li><a href="/modern_swimmer2" >Race Sign Up</a></li>
            <li><a href="/allswimmers" >All Swimmers</a></li>
            <li><a href="/start_race" >Start Race</a></li>
            <li><a href="/upload" >Upload Online Registrants</a></li>
            <li><a href="/upload-seasonpass" >Upload Season Pass Holders</a></li>
            <li><a href="/upload_waivers" >Upload Waivers</a></li>
            <li><a href="/join_swim2" >Create Swim</a></li>
        </ul>
    </div>
    <script src="js/race_results.js"></script>

    <script>
        function open_edit_dialog(bib_num,race,time){
            document.getElementById('editDialog').classList.toggle('hidden')
            document.getElementById('editTime').value = time;
            document.getElementById('edit'+race).checked = true;
            document.getElementById('bibNumHidden').value = bib_num;
        }
        function hms2s(time){
            if(time==='DNF'){
                return ''
            }
            l = time.split(/[hms]/)
            res = parseInt(l[0])*60*60 + parseInt(l[1])*60 + parseInt(l[2])
            return res
        }
        async function edit_race(bib_num,time,race) {
            return fetch('/users/update', {
                method: "PATCH",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ 'time': time, 'bib_num':bib_num, 'race':race }),
            });
        }
        function close_edit_dialog(){
            document.getElementById('editDialog').classList.toggle('hidden')
        }
        async function publishEdit(){
            race = null;
            if (document.getElementById('edit500m').checked){race='500m'}
            if (document.getElementById('edit1000m').checked){race='1000m'}
            if (document.getElementById('edit1mile').checked){race='1mile'}
            if (document.getElementById('editbiath').checked){race='biath'}
            time = document.getElementById('editTime').value
            time = hms2s(time)
            bib_num = document.getElementById('bibNumHidden').value
            await edit_race(bib_num,time,race)
            close_edit_dialog()
            location.reload()

        }
        function publishRaceResults(){
            input = document.getElementById('raceName').value;
            fetch('/upload_race_results', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ fname:  input}) // Replace with your actual data
            })
            .then(response => response.json())
            .then(data => {window.location.href = window.location.origin + `/archive/${input}`})
            .catch(error => console.error('Error:', error));

        }
        document.addEventListener("DOMContentLoaded", () => {
            fetch('/currentswimmers').then(x=>{
                x.json().then(dummyData=>{
                    fetch('/test').then(x=>{
                        x.json().then(x=>{
                            if(x.message === 'OK'){
                                displayResults(dummyData,true);
                            }
                            else{
                                displayResults(dummyData,false);
                            }
                        })
                    })
                    // displayResults(dummyData,true);
                })
            })
            // displayResults(dummyData);
        });
        save_btn = document.getElementById('saveBtn')
        save_btn.addEventListener('click',()=>{
            document.getElementById('confirmDialog').classList.toggle('hidden')
        })

        fetch("/swims/current").then(x=>{
            x.json().then(data=>{
                document.getElementById('raceName').value = data.status
            })
        })
    </script>
</body>
